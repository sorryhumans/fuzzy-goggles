<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local Lead Finder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ─── Sidebar navigation ─────────────────────────────────── -->
  <aside class="nav">
    <div class="nav-brand">
      <span class="nav-icon">L</span>
      <span class="nav-title">Lead Finder</span>
    </div>
    <nav class="nav-links">
      <a href="#" class="nav-link active">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6.5 2H3a1 1 0 0 0-1 1v3.5a1 1 0 0 0 1 1h3.5a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1Zm6.5 0h-3.5a1 1 0 0 0-1 1v3.5a1 1 0 0 0 1 1H13a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1ZM6.5 8.5H3a1 1 0 0 0-1 1V13a1 1 0 0 0 1 1h3.5a1 1 0 0 0 1-1V9.5a1 1 0 0 0-1-1Zm6.5 0h-3.5a1 1 0 0 0-1 1V13a1 1 0 0 0 1 1H13a1 1 0 0 0 1-1V9.5a1 1 0 0 0-1-1Z" stroke="currentColor" stroke-width="1.2"/></svg>
        Search
      </a>
    </nav>
    <div class="nav-footer">v1.0</div>
  </aside>

  <!-- ─── Main area ───────────────────────────────────────────── -->
  <div class="main">

    <!-- Top bar -->
    <header class="topbar">
      <div class="topbar-left">
        <h1 class="page-title">Search leads</h1>
        <span class="page-desc">Enter a postcode and category to find local businesses.</span>
      </div>
      <div id="statusMsg" class="status-pill"></div>
    </header>

    <!-- Search controls -->
    <section class="controls">
      <div class="control-group">
        <label class="control-label" for="zipInput">Postcode</label>
        <input type="text" id="zipInput" class="control-input" placeholder="e.g. E1" autocomplete="off" />
      </div>
      <div class="control-group">
        <label class="control-label" for="categoryInput">Category</label>
        <input type="text" id="categoryInput" class="control-input" placeholder="e.g. restaurants" autocomplete="off" />
      </div>
      <button id="searchBtn" class="btn-primary">Search</button>
    </section>

    <!-- Content split: map + leads table -->
    <section class="workspace">
      <div class="map-panel">
        <div id="map"></div>
      </div>
      <div class="leads-panel">
        <div class="leads-header">
          <span class="leads-heading">Top Leads</span>
          <span class="leads-count" id="leadsCount"></span>
        </div>
        <div id="leadsList" class="leads-list">
          <div class="empty-state">
            <div class="empty-icon">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none"><path d="M21 21l-4.35-4.35M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            </div>
            <p>No leads yet</p>
            <span>Run a search to populate this list.</span>
          </div>
        </div>
      </div>
    </section>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="app.js"></script>
</body>
</html>
