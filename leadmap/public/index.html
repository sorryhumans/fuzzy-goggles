<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LEADMAP</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --border: #1e1e1e;
  --text: #f0f0f0;
  --text-dim: #777;
  --red: #e82127;
  --red-dark: #b8191e;
  --green: #22c55e;
  --sidebar-w: 340px;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
}

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  height: 100vh;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}

.sidebar-header {
  padding: 24px 20px 0;
}

.logo-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}

.logo {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 26px;
  letter-spacing: 3px;
}

.logo span { color: var(--red); }

/* ── Auth bar ── */
.auth-bar {
  display: flex;
  align-items: center;
  gap: 8px;
}

.auth-bar .user-email {
  font-size: 11px;
  color: var(--text-dim);
  max-width: 110px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.btn-auth {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: 'Rajdhani', sans-serif;
  font-weight: 600;
  font-size: 12px;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  padding: 4px 10px;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-auth:hover { border-color: var(--text); color: var(--text); }

.field { margin-bottom: 12px; }

.field label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-dim);
  margin-bottom: 6px;
}

.field input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  padding: 10px 12px;
  outline: none;
  transition: border-color 0.2s;
}

.field input:focus { border-color: var(--red); }

.btn-search {
  width: 100%;
  padding: 12px;
  margin-top: 4px;
  margin-bottom: 8px;
  background: var(--red);
  color: #fff;
  border: none;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 15px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: background 0.2s;
}

.btn-search:hover { background: var(--red-dark); }
.btn-search:disabled { opacity: 0.6; cursor: not-allowed; }

.btn-search .spinner {
  display: none;
  width: 16px;
  height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}

.btn-search.loading .spinner { display: block; }
.btn-search.loading .btn-label { display: none; }

@keyframes spin { to { transform: rotate(360deg); } }

/* ── Upgrade button ── */
.btn-upgrade {
  width: 100%;
  padding: 10px;
  margin-bottom: 16px;
  background: transparent;
  border: 1px solid var(--red);
  color: var(--red);
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-upgrade:hover { background: var(--red); color: #fff; }

.btn-upgrade.pro {
  border-color: var(--green);
  color: var(--green);
  cursor: default;
  pointer-events: none;
}

.results-meta {
  padding: 0 20px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text-dim);
  border-bottom: 1px solid var(--border);
}

.badge {
  background: rgba(232, 33, 39, 0.15);
  color: var(--red);
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  letter-spacing: 0.5px;
}

.btn-export {
  display: none;
  width: calc(100% - 40px);
  margin: 12px 20px 0;
  padding: 10px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.15);
  color: #fff;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-export:hover {
  background: rgba(255,255,255,0.06);
  border-color: rgba(255,255,255,0.3);
}

/* ── Lead list ── */
.lead-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}

.lead-list::-webkit-scrollbar { width: 4px; }
.lead-list::-webkit-scrollbar-track { background: transparent; }
.lead-list::-webkit-scrollbar-thumb { background: var(--border); }

.lead-card {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
}

.lead-card:hover, .lead-card.active {
  background: rgba(232, 33, 39, 0.06);
}

.lead-card.active {
  border-left: 3px solid var(--red);
  padding-left: 17px;
}

.lead-card h3 {
  font-family: 'Rajdhani', sans-serif;
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.lead-card-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 12px;
  color: var(--text-dim);
}

.lead-card-meta .star { color: #f5a623; }

.lead-card-icons {
  display: flex;
  gap: 6px;
  margin-left: auto;
}

.lead-card-icons svg {
  width: 14px;
  height: 14px;
  fill: var(--text-dim);
}

.empty-state {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px 20px;
  color: var(--text-dim);
  font-size: 14px;
  line-height: 1.6;
}

/* ── Map ── */
.map-wrap {
  flex: 1;
  position: relative;
}

#map {
  width: 100%;
  height: 100%;
}

.leaflet-tile-pane { filter: brightness(0.7) saturate(0.4) invert(1) hue-rotate(180deg); }

.leaflet-control-attribution { display: none !important; }

/* Progress bar */
.progress-bar {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 3px;
  z-index: 1000;
  display: none;
}

.progress-bar.active { display: block; }

.progress-bar::after {
  content: '';
  display: block;
  height: 100%;
  width: 30%;
  background: var(--red);
  animation: progress 1.2s ease-in-out infinite;
}

@keyframes progress {
  0%   { transform: translateX(-100%); }
  100% { transform: translateX(400%); }
}

/* ── Modal (shared for lead detail + auth) ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 2000;
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-overlay.open { display: flex; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  width: 440px;
  max-height: 85vh;
  overflow-y: auto;
  padding: 28px;
  position: relative;
}

.modal-close {
  position: absolute;
  top: 16px;
  right: 16px;
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 22px;
  cursor: pointer;
  line-height: 1;
}

.modal-close:hover { color: var(--text); }

.modal h2 {
  font-family: 'Rajdhani', sans-serif;
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 4px;
  padding-right: 30px;
}

.modal-rating {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 14px;
  color: var(--text-dim);
  margin-bottom: 20px;
}

.modal-rating .star { color: #f5a623; }

.modal-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 0;
  border-top: 1px solid var(--border);
  font-size: 13px;
  line-height: 1.5;
}

.modal-row-label {
  flex-shrink: 0;
  width: 80px;
  color: var(--text-dim);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  padding-top: 1px;
}

.modal-row-value {
  flex: 1;
  word-break: break-word;
}

.modal-row-value a {
  color: var(--red);
  text-decoration: none;
}

.modal-row-value a:hover { text-decoration: underline; }

.copy-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 11px;
  padding: 2px 8px;
  cursor: pointer;
  margin-left: 8px;
  transition: all 0.2s;
}

.copy-btn:hover { border-color: var(--red); color: var(--red); }

.btn-copy-all {
  width: 100%;
  margin-top: 20px;
  padding: 10px;
  background: transparent;
  border: 1px solid var(--red);
  color: var(--red);
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-copy-all:hover { background: var(--red); color: #fff; }

/* ── Auth modal fields ── */
.auth-field {
  margin-bottom: 14px;
}

.auth-field label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  margin-bottom: 6px;
}

.auth-field input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  padding: 10px 12px;
  outline: none;
  transition: border-color 0.2s;
}

.auth-field input:focus { border-color: var(--red); }

.auth-actions {
  display: flex;
  gap: 10px;
  margin-top: 18px;
}

.auth-actions button {
  flex: 1;
  padding: 10px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
}

.auth-actions .btn-signin {
  background: var(--red);
  color: #fff;
}

.auth-actions .btn-signin:hover { background: var(--red-dark); }

.auth-actions .btn-signup {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
}

.auth-actions .btn-signup:hover { border-color: var(--text); }

.auth-error {
  color: var(--red);
  font-size: 12px;
  margin-top: 10px;
  min-height: 18px;
}

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #1a1a1a;
  border: 1px solid var(--red);
  color: var(--text);
  font-size: 13px;
  padding: 10px 20px;
  z-index: 3000;
  transition: transform 0.3s ease;
  pointer-events: none;
}

.toast.show { transform: translateX(-50%) translateY(0); }

/* ── Custom marker ── */
.diamond-marker {
  width: 16px;
  height: 16px;
  background: var(--red);
  transform: rotate(45deg);
  border: 2px solid #fff;
  box-shadow: 0 0 6px rgba(232, 33, 39, 0.6);
  transition: transform 0.15s, box-shadow 0.15s;
}

.diamond-marker.highlight {
  transform: rotate(45deg) scale(1.4);
  box-shadow: 0 0 14px rgba(232, 33, 39, 0.9);
}

/* ── Landing Screen ── */
#landingScreen {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 1;
  transition: opacity 0.4s ease;
}

#landingScreen.fade-out {
  opacity: 0;
}

.landing-live {
  position: absolute;
  top: 28px;
  right: 36px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-dim);
}

.landing-live-dot {
  width: 8px;
  height: 8px;
  background: var(--red);
  border-radius: 50%;
  animation: blink-dot 2s ease-in-out infinite;
}

@keyframes blink-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.2; }
}

.landing-content {
  text-align: center;
  max-width: 520px;
  padding: 0 24px;
}

.landing-logo {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 72px;
  letter-spacing: 6px;
  line-height: 1;
  margin-bottom: 16px;
}

.landing-logo span {
  color: var(--red);
}

.landing-tagline {
  font-size: 16px;
  color: var(--text-dim);
  line-height: 1.5;
  margin-bottom: 48px;
}

.landing-features {
  list-style: none;
  text-align: left;
  margin: 0 auto 48px;
  max-width: 360px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.landing-features li {
  display: flex;
  align-items: center;
  gap: 14px;
  font-size: 14px;
  color: var(--text);
  line-height: 1.4;
}

.landing-features li svg {
  flex-shrink: 0;
  width: 20px;
  height: 20px;
  stroke: var(--red);
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.btn-cta {
  display: inline-block;
  padding: 14px 48px;
  background: #fff;
  color: #000;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 16px;
  letter-spacing: 2px;
  text-transform: uppercase;
  border: none;
  border-radius: 0;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
}

.btn-cta:hover {
  background: var(--red);
  color: #fff;
}

#app {
  display: flex;
  width: 100%;
  height: 100vh;
  opacity: 0;
  transition: opacity 0.4s ease;
}

#app.visible {
  opacity: 1;
}
</style>
</head>
<body>

<!-- Landing Screen -->
<div id="landingScreen">
  <div class="landing-live">
    <div class="landing-live-dot"></div>
    LIVE DATA
  </div>
  <div class="landing-content">
    <div class="landing-logo">LEAD<span>MAP</span></div>
    <p class="landing-tagline">Find local businesses. Generate leads. Close deals.</p>
    <ul class="landing-features">
      <li>
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Search by ZIP code + city + category
      </li>
      <li>
        <svg viewBox="0 0 24 24"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
        See results on interactive map
      </li>
      <li>
        <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="0"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy contact info instantly
      </li>
    </ul>
    <button class="btn-cta" id="ctaBtn">START SEARCHING &rarr;</button>
  </div>
</div>

<!-- App -->
<div id="app">

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo-row">
      <div class="logo">LEAD<span>MAP</span></div>
      <div class="auth-bar" id="authBar">
        <button class="btn-auth" id="authBtn">Sign In</button>
      </div>
    </div>
    <div class="field">
      <label>ZIP Code</label>
      <input type="text" id="zipInput" placeholder="e.g. 90210" maxlength="10" />
    </div>
    <div class="field">
      <label>City</label>
      <input type="text" id="cityInput" placeholder="e.g. Beverly Hills" />
    </div>
    <div class="field">
      <label>Business Category</label>
      <input type="text" id="catInput" placeholder="e.g. Dentists, Plumbers" />
    </div>
    <button class="btn-search" id="searchBtn">
      <span class="btn-label">Search Leads</span>
      <span class="spinner"></span>
    </button>
    <button class="btn-upgrade" id="upgradeBtn">&#9889; UPGRADE TO PRO — $9.99/mo</button>
  </div>

  <div class="results-meta" id="resultsMeta" style="display:none">
    <span id="resultsCount">0 leads</span>
    <span class="badge">&#9733; 4.0+</span>
  </div>

  <button class="btn-export" id="exportBtn">↓ EXPORT CSV</button>

  <div class="lead-list" id="leadList">
    <div class="empty-state" id="emptyState">
      Enter ZIP, City &amp; Category<br />to find leads
    </div>
  </div>
</aside>

<!-- Map -->
<div class="map-wrap">
  <div class="progress-bar" id="progressBar"></div>
  <div id="map"></div>
</div>

<!-- Lead Detail Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal"></div>
</div>

<!-- Auth Modal -->
<div class="modal-overlay" id="authOverlay">
  <div class="modal" id="authModal" style="width:360px">
    <button class="modal-close" id="authModalClose">&times;</button>
    <h2>Sign In</h2>
    <div style="margin-top:18px">
      <div class="auth-field">
        <label>Email</label>
        <input type="email" id="authEmail" placeholder="you@email.com" />
      </div>
      <div class="auth-field">
        <label>Password</label>
        <input type="password" id="authPassword" placeholder="Min 6 characters" />
      </div>
      <div class="auth-actions">
        <button class="btn-signin" id="btnSignIn">Sign In</button>
        <button class="btn-signup" id="btnSignUp">Sign Up</button>
      </div>
      <div class="auth-error" id="authError"></div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

</div><!-- /app -->

<script>
const SUPABASE_URL = 'https://wxmjigbfkciuqeqgegrb.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_oThGtUUYCmmIcfSQW0ykmA_VRP5Qq0D';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let accessToken = null;
let userPlan = 'free';

// ── Landing screen transition ──
document.getElementById('ctaBtn').addEventListener('click', () => {
  const landing = document.getElementById('landingScreen');
  const app = document.getElementById('app');
  landing.classList.add('fade-out');
  app.classList.add('visible');
  landing.addEventListener('transitionend', () => {
    landing.style.display = 'none';
  }, { once: true });
});

// ── Handle ?upgraded=true ──
if (new URLSearchParams(window.location.search).get('upgraded') === 'true') {
  history.replaceState(null, '', window.location.pathname);
  document.getElementById('landingScreen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  setTimeout(() => showToast('Welcome to Pro! You now get 50 leads per search'), 500);
}

(() => {
  const $ = (s) => document.querySelector(s);
  const map = L.map('map', { zoomControl: false }).setView([39.5, -98.35], 4);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
  L.control.zoom({ position: 'topright' }).addTo(map);

  let leads = [];
  let markers = [];
  let activeIdx = -1;

  const zipInput = $('#zipInput');
  const cityInput = $('#cityInput');
  const catInput = $('#catInput');
  const searchBtn = $('#searchBtn');
  const leadList = $('#leadList');
  const emptyState = $('#emptyState');
  const resultsMeta = $('#resultsMeta');
  const resultsCount = $('#resultsCount');
  const progressBar = $('#progressBar');
  const modalOverlay = $('#modalOverlay');
  const modal = $('#modal');
  const toast = $('#toast');
  const exportBtn = $('#exportBtn');
  const authBar = $('#authBar');
  const authOverlay = $('#authOverlay');
  const authModalClose = $('#authModalClose');
  const authEmail = $('#authEmail');
  const authPassword = $('#authPassword');
  const btnSignIn = $('#btnSignIn');
  const btnSignUp = $('#btnSignUp');
  const authError = $('#authError');
  const upgradeBtn = $('#upgradeBtn');

  // ── Auth UI (delegated so it survives innerHTML replacements) ──
  authBar.addEventListener('click', (e) => {
    const btn = e.target.closest('.btn-auth');
    if (!btn) return;
    if (currentUser) {
      sb.auth.signOut({ scope: 'local' });
      currentUser = null;
      accessToken = null;
      userPlan = 'free';
      renderAuthBar();
      showToast('Signed out.');
    } else {
      authError.textContent = '';
      authEmail.value = '';
      authPassword.value = '';
      authOverlay.classList.add('open');
    }
  });

  authModalClose.addEventListener('click', () => authOverlay.classList.remove('open'));
  authOverlay.addEventListener('click', (e) => { if (e.target === authOverlay) authOverlay.classList.remove('open'); });

  btnSignIn.addEventListener('click', async () => {
    authError.textContent = '';
    const email = authEmail.value.trim();
    const password = authPassword.value;
    if (!email || !password) { authError.textContent = 'Email and password required.'; return; }
    btnSignIn.disabled = true;
    btnSignIn.textContent = 'Signing in...';
    try {
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) authError.textContent = error.message;
    } catch (err) {
      authError.textContent = err.message || 'Connection error. Try again.';
    } finally {
      btnSignIn.disabled = false;
      btnSignIn.textContent = 'Sign In';
    }
  });

  btnSignUp.addEventListener('click', async () => {
    authError.textContent = '';
    const email = authEmail.value.trim();
    const password = authPassword.value;
    if (!email || !password) { authError.textContent = 'Email and password required.'; return; }
    if (password.length < 6) { authError.textContent = 'Password must be at least 6 characters.'; return; }

    btnSignUp.disabled = true;
    btnSignUp.textContent = 'Creating...';
    try {
      const { data, error } = await sb.auth.signUp({ email, password });
      if (error) { authError.textContent = error.message; return; }

      if (data.user) {
        const token = data.session?.access_token;
        await fetch('/api/ensure-user', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            ...(token ? { Authorization: `Bearer ${token}` } : {})
          },
          body: JSON.stringify({ userId: data.user.id })
        });
      }

      authOverlay.classList.remove('open');
      showToast('Account created! Check your email to confirm.');
    } catch (err) {
      authError.textContent = err.message || 'Connection error. Try again.';
    } finally {
      btnSignUp.disabled = false;
      btnSignUp.textContent = 'Sign Up';
    }
  });

  // ── Supabase auth state listener ──
  sb.auth.onAuthStateChange(async (event, session) => {
    if (session?.user) {
      currentUser = session.user;
      accessToken = session.access_token;
      authOverlay.classList.remove('open');
      renderAuthBar();
      if (event === 'SIGNED_IN') showToast('Signed in!');
      await fetchUserPlan();
      renderUpgradeBtn();
    } else {
      currentUser = null;
      accessToken = null;
      userPlan = 'free';
      renderAuthBar();
    }
  });

  async function fetchUserPlan() {
    if (!currentUser) { userPlan = 'free'; return; }
    const { data } = await sb
      .from('users')
      .select('plan')
      .eq('id', currentUser.id)
      .single();
    userPlan = data?.plan || 'free';
  }

  function renderAuthBar() {
    if (currentUser) {
      authBar.innerHTML = `
        <span class="user-email">${currentUser.email}</span>
        <button class="btn-auth">Sign Out</button>`;
    } else {
      authBar.innerHTML = `<button class="btn-auth">Sign In</button>`;
    }
    renderUpgradeBtn();
  }

  function renderUpgradeBtn() {
    if (currentUser && userPlan === 'pro') {
      upgradeBtn.textContent = '\u2713 PRO PLAN';
      upgradeBtn.classList.add('pro');
      upgradeBtn.style.display = 'none';
    } else {
      upgradeBtn.innerHTML = '&#9889; UPGRADE TO PRO — $9.99/mo';
      upgradeBtn.classList.remove('pro');
      upgradeBtn.style.display = '';
    }
  }

  // ── Upgrade ──
  upgradeBtn.addEventListener('click', async () => {
    if (userPlan === 'pro') return;
    if (!currentUser) {
      authOverlay.classList.add('open');
      showToast('Sign in first to upgrade.');
      return;
    }
    try {
      const res = await fetch('/api/create-checkout', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          Authorization: `Bearer ${accessToken}`,
        },
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      window.location.href = data.url;
    } catch (err) {
      showToast(err.message);
    }
  });

  // ── CSV Export ──
  exportBtn.addEventListener('click', downloadCSV);

  function buildCSV(data) {
    const columns = ['Name','Category','Address','City','Phone','Email','Website','Rating','Reviews','Hours'];
    const escCSV = (v) => {
      const s = (v == null) ? '' : String(v);
      return s.includes(',') || s.includes('"') || s.includes('\n') ? '"' + s.replace(/"/g, '""') + '"' : s;
    };
    const rows = data.map((l) => [
      l.title || '',
      l.categoryName || '',
      l.address || '',
      l.city || '',
      l.phone || '',
      l.email || '',
      l.website || '',
      l.totalScore != null ? l.totalScore : '',
      l.reviewsCount != null ? l.reviewsCount : '',
      Array.isArray(l.openingHours) ? l.openingHours.map((h) => typeof h === 'string' ? h : `${h.day}: ${h.hours}`).join(' | ') : (l.openingHours || ''),
    ].map(escCSV).join(','));
    return '\uFEFF' + columns.join(',') + '\n' + rows.join('\n');
  }

  function downloadCSV() {
    const zip = zipInput.value.trim() || 'unknown';
    const cat = catInput.value.trim() || 'leads';
    const date = new Date().toISOString().slice(0, 10);
    const filename = `leads_${zip}_${cat}_${date}.csv`.replace(/\s+/g, '-');
    const blob = new Blob([buildCSV(leads)], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('CSV exported!');
  }

  // ── Search ──
  searchBtn.addEventListener('click', doSearch);
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !searchBtn.disabled && !authOverlay.classList.contains('open')) doSearch();
    if (e.key === 'Escape') { closeModal(); authOverlay.classList.remove('open'); }
  });

  async function doSearch() {
    const zip = zipInput.value.trim();
    const city = cityInput.value.trim();
    const category = catInput.value.trim();
    if (!zip || !city || !category) return showToast('Please enter ZIP, city, and category.');

    setLoading(true);
    try {
      const headers = { 'Content-Type': 'application/json' };
      if (currentUser && accessToken) headers.Authorization = `Bearer ${accessToken}`;

      const res = await fetch('/api/search', {
        method: 'POST',
        headers,
        body: JSON.stringify({ zip, city, category }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Search failed.');
      leads = data;
      renderResults();
    } catch (err) {
      showToast(err.message);
    } finally {
      setLoading(false);
    }
  }

  function setLoading(on) {
    searchBtn.disabled = on;
    searchBtn.classList.toggle('loading', on);
    progressBar.classList.toggle('active', on);
  }

  // ── Render results ──
  function renderResults() {
    clearMarkers();
    leadList.innerHTML = '';
    activeIdx = -1;

    if (!leads.length) {
      leadList.appendChild(emptyState);
      emptyState.textContent = 'No leads found with \u2605 4.0+';
      resultsMeta.style.display = 'none';
      exportBtn.style.display = 'none';
      return;
    }

    resultsMeta.style.display = 'flex';
    exportBtn.style.display = 'block';
    resultsCount.textContent = `${leads.length} lead${leads.length !== 1 ? 's' : ''}`;

    const bounds = [];

    leads.forEach((lead, i) => {
      const card = document.createElement('div');
      card.className = 'lead-card';
      card.dataset.idx = i;
      card.innerHTML = `
        <h3>${esc(lead.title || lead.name || 'Unnamed')}</h3>
        <div class="lead-card-meta">
          <span class="star">&#9733;</span> ${lead.totalScore ?? '\u2014'}
          <span style="margin-left:2px">(${lead.reviewsCount ?? 0})</span>
          <span class="lead-card-icons">
            ${lead.phone ? phoneSVG : ''}
            ${lead.website || lead.url ? globeSVG : ''}
          </span>
        </div>`;
      card.addEventListener('click', () => selectLead(i));
      leadList.appendChild(card);

      if (lead.location?.lat && lead.location?.lng) {
        const el = L.divIcon({ className: '', html: '<div class="diamond-marker"></div>', iconSize: [16, 16], iconAnchor: [8, 8] });
        const m = L.marker([lead.location.lat, lead.location.lng], { icon: el }).addTo(map);
        m.on('click', () => selectLead(i));
        markers.push(m);
        bounds.push([lead.location.lat, lead.location.lng]);
      } else {
        markers.push(null);
      }
    });

    if (bounds.length) map.fitBounds(bounds, { padding: [50, 50], maxZoom: 13 });
  }

  function clearMarkers() {
    markers.forEach((m) => m && map.removeLayer(m));
    markers = [];
  }

  // ── Select lead ──
  function selectLead(i) {
    activeIdx = i;
    document.querySelectorAll('.lead-card').forEach((c) => c.classList.remove('active'));
    const card = document.querySelector(`.lead-card[data-idx="${i}"]`);
    if (card) {
      card.classList.add('active');
      card.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }

    document.querySelectorAll('.diamond-marker').forEach((d) => d.classList.remove('highlight'));
    if (markers[i]) {
      const el = markers[i].getElement();
      if (el) el.querySelector('.diamond-marker')?.classList.add('highlight');
      map.panTo(markers[i].getLatLng(), { animate: true });
    }

    openModal(leads[i]);
  }

  // ── Lead Detail Modal ──
  function openModal(lead) {
    const name = lead.title || lead.name || 'Unnamed';
    const phone = lead.phone || '';
    const email = lead.email || '';
    const website = lead.website || lead.url || '';
    const address = lead.address || lead.street || '';
    const hours = formatHours(lead.openingHours);
    const cat = lead.categoryName || lead.category || '';

    modal.innerHTML = `
      <button class="modal-close" id="modalClose">&times;</button>
      <h2>${esc(name)}</h2>
      <div class="modal-rating">
        <span class="star">&#9733;</span> ${lead.totalScore ?? '\u2014'}
        <span>(${lead.reviewsCount ?? 0} reviews)</span>
      </div>
      ${row('Address', esc(address))}
      ${row('Phone', phone ? `${esc(phone)} <button class="copy-btn" data-copy="${esc(phone, true)}">Copy</button>` : '\u2014')}
      ${row('Email', email ? `${esc(email)} <button class="copy-btn" data-copy="${esc(email, true)}">Copy</button>` : '\u2014')}
      ${row('Website', website ? `<a href="${esc(website, true)}" target="_blank" rel="noopener">${truncate(website, 40)}</a>` : '\u2014')}
      ${row('Hours', hours || '\u2014')}
      ${row('Category', esc(cat) || '\u2014')}
      <button class="btn-copy-all" id="copyAllBtn">Copy All Info</button>`;

    modal.querySelectorAll('.copy-btn').forEach((b) => {
      b.addEventListener('click', (e) => {
        e.stopPropagation();
        copyText(b.dataset.copy);
        showToast('Copied!');
      });
    });

    $('#copyAllBtn').addEventListener('click', () => {
      const text = [
        name,
        address ? `Address: ${address}` : '',
        phone ? `Phone: ${phone}` : '',
        email ? `Email: ${email}` : '',
        website ? `Website: ${website}` : '',
        hours ? `Hours: ${hours.replace(/<br\s*\/?>/g, ', ')}` : '',
        cat ? `Category: ${cat}` : '',
        `Rating: ${lead.totalScore ?? '\u2014'} (${lead.reviewsCount ?? 0} reviews)`,
      ].filter(Boolean).join('\n');
      copyText(text);
      showToast('All info copied!');
    });

    $('#modalClose').addEventListener('click', closeModal);
    modalOverlay.classList.add('open');
    modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });
  }

  function closeModal() { modalOverlay.classList.remove('open'); }

  function row(label, value) {
    return `<div class="modal-row"><span class="modal-row-label">${label}</span><span class="modal-row-value">${value}</span></div>`;
  }

  // ── Toast (expose globally for upgraded check) ──
  window.showToast = showToast;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  // ── Helpers ──
  function esc(str, attr = false) {
    if (!str) return '';
    const d = document.createElement('div');
    d.textContent = str;
    return attr ? d.innerHTML.replace(/"/g, '&quot;') : d.innerHTML;
  }

  function truncate(s, n) { return s.length > n ? s.slice(0, n) + '\u2026' : s; }

  function copyText(t) { navigator.clipboard.writeText(t).catch(() => {}); }

  function formatHours(h) {
    if (!h) return '';
    if (typeof h === 'string') return esc(h);
    if (Array.isArray(h)) return h.map((d) => esc(typeof d === 'string' ? d : `${d.day}: ${d.hours}`)).join('<br>');
    return '';
  }

  const phoneSVG = `<svg viewBox="0 0 24 24"><path d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2a1 1 0 011.01-.24 11.36 11.36 0 003.58.57 1 1 0 011 1v3.49a1 1 0 01-1 1A17 17 0 013 4a1 1 0 011-1h3.5a1 1 0 011 1 11.36 11.36 0 00.57 3.58 1 1 0 01-.25 1.01l-2.2 2.2z"/></svg>`;
  const globeSVG = `<svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm0 2a8 8 0 016.32 3.1A12.93 12.93 0 0012 5.5a12.93 12.93 0 00-6.32 1.6A8 8 0 0112 4zm0 16a8 8 0 01-6.32-3.1A12.93 12.93 0 0012 18.5a12.93 12.93 0 006.32-1.6A8 8 0 0112 20zm0-9a1 1 0 110 2 1 1 0 010-2zM2 12h4m12 0h4M12 2v4m0 12v4"/></svg>`;
})();
</script>
</body>
</html>
